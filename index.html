<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4ussieTrip — Perth → Brisbane 43 Days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --navy: #0d1f35;
  --navy-mid: #1a3a5c;
  --navy-light: #1a5490;
  --amber: oklch(0.72 0.15 60);
  --amber-dark: oklch(0.58 0.18 50);
  --teal: oklch(0.70 0.12 195);
  --teal-light: oklch(0.82 0.10 195);
  --cream: #f5f0eb;
  --warm-white: #faf7f3;
  --gray-mid: #8a9ab0;
  --gray-soft: #c8d3e0;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Playfair Display', serif;
  --font-body: 'Source Sans 3', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: var(--font-body);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 3rem;
  background: linear-gradient(to bottom, rgba(13,31,53,0.95) 0%, transparent 100%);
  backdrop-filter: blur(6px);
  transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
nav.scrolled {
  background: rgba(13,31,53,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 1.2rem 3rem;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.6rem;
  letter-spacing: 0.1em;
  color: var(--cream);
  text-decoration: none;
  transition: font-size 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
nav.scrolled .nav-logo {
  font-size: 1.4rem;
}
.nav-logo span { color: var(--amber); }
.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}
.nav-links a {
  color: var(--gray-soft);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
  transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--amber);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.nav-links a:hover { color: var(--amber); }
.nav-links a:hover::after { width: 100%; }
.nav-cta {
  background: var(--amber);
  color: var(--navy);
  padding: 0.55rem 1.4rem;
  border-radius: 2px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: none;
  cursor: pointer;
}
.nav-cta:hover { background: var(--amber-dark); color: #fff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
.menu-toggle {
  display: block;
  background: transparent;
  border: none;
  color: var(--cream);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0.5rem;
  margin: 0 0 0 auto;
  margin-right: 0.3rem;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.menu-toggle:active {
  transform: scale(0.95);
}
.menu-toggle.open {
  transform: rotate(90deg);
}
.nav-links {
  display: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
}
.nav-links.mobile-open {
  display: flex !important;
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  flex-direction: column;
  background: linear-gradient(to bottom, rgba(13,31,53,0.98) 0%, rgba(13,31,53,0.95) 100%);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 0.5rem 1rem;
  gap: 0;
  z-index: 99;
  max-height: calc(100vh - 56px);
  opacity: 1;
  animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.nav-links.mobile-open li {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation-fill-mode: both;
}
.nav-links.mobile-open li:nth-child(1) { animation-delay: 0.05s; }
.nav-links.mobile-open li:nth-child(2) { animation-delay: 0.1s; }
.nav-links.mobile-open li:nth-child(3) { animation-delay: 0.15s; }
.nav-links.mobile-open li:last-child {
  border-bottom: none;
}
.nav-links.mobile-open a {
  display: block;
  padding: 0.75rem 0;
  transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.nav-links.mobile-open a:active {
  color: var(--amber);
}
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(-5px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── HERO ── */
#hero {
  position: relative;
  height: 100vh;
  min-height: 700px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 3rem 0;
  overflow: hidden;
}
#hero > *:not(.hero-bg):not(.hero-scroll) {
  transform: translateY(-4vh);
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top, rgba(13,31,53,0.92) 0%, rgba(13,31,53,0.4) 50%, rgba(13,31,53,0.2) 100%),
    url('https://images.unsplash.com/photo-1587139223877-04cb899fa3e8?w=1800&q=80') center/cover no-repeat;
}
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 40%, rgba(26,84,144,0.15) 0%, transparent 60%);
}
.hero-tag {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  animation: fadeUp 0.8s ease 0.1s both;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(4rem, 12vw, 11rem);
  line-height: 0.92;
  letter-spacing: 0.02em;
  color: var(--cream);
  text-wrap: pretty;
  margin-bottom: 1.5rem;
}
.hero-title .arrow {
  color: var(--amber);
  margin: 0 0.15em;
}
.hero-sub {
  font-family: var(--font-serif);
  font-size: clamp(1rem, 2vw, 1.4rem);
  font-style: italic;
  color: var(--teal-light);
  margin-bottom: 1.2rem;
  letter-spacing: 0.02em;
}
.hero-headline {
  font-family: var(--font-serif);
  font-size: clamp(1.3rem, 3.2vw, 2.4rem);
  font-style: italic;
  font-weight: 400;
  color: var(--cream);
  margin-bottom: 2rem;
  letter-spacing: 0.01em;
  line-height: 1.35;
  animation: fadeUp 1.1s ease 0.5s both;
  text-shadow: 0 2px 16px rgba(0,0,0,0.6);
}
.hero-headline strong {
  font-style: normal;
  font-weight: 700;
  color: var(--amber);
  font-family: var(--font-display);
  font-size: 1.5em;
  letter-spacing: 0.06em;
  display: block;
  line-height: 1;
}
.hero-pills {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
  justify-content: center;
}
.pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--cream);
  padding: 0.4rem 1rem;
  border-radius: 100px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  font-weight: 600;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
}
.hero-stats {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 2.5rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border-radius: 4px;
  padding: 1rem 1.8rem;
  width: fit-content;
  animation: fadeUp 1.2s ease 0.6s both;
}
.hero-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.15rem;
  padding: 0 1.6rem;
}
.hero-stat-num {
  font-family: var(--font-display);
  font-size: 2.2rem;
  line-height: 1;
  letter-spacing: 0.04em;
  color: var(--amber);
}
.hero-stat-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-soft);
}
.hero-stat-divider {
  width: 1px;
  height: 2.5rem;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.hero-btns {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp 1.3s ease 0.8s both;
}
.btn-primary {
  background: var(--amber);
  color: var(--navy);
  padding: 0.9rem 2.2rem;
  border-radius: 2px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.2s;
  border: none;
  cursor: pointer;
  display: inline-block;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-primary:hover { background: var(--amber-dark); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.btn-outline {
  background: transparent;
  color: var(--cream);
  padding: 0.9rem 2.2rem;
  border-radius: 2px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.3);
  transition: all 0.2s;
  cursor: pointer;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-outline:hover { border-color: var(--teal); color: var(--teal-light); }

.hero-scroll {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  color: var(--gray-mid);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.scroll-line {
  width: 1px;
  height: 3rem;
  background: linear-gradient(to bottom, transparent, var(--amber));
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity: 0.3; transform: scaleY(0.6); }
  50% { opacity: 1; transform: scaleY(1); }
}

/* ── SECTION SHARED ── */
section { padding: 6rem 3rem; }
.section-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.section-label::before {
  content: '';
  display: block;
  width: 2rem;
  height: 1px;
  background: var(--amber);
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  line-height: 1;
  letter-spacing: 0.03em;
  color: var(--cream);
  margin-bottom: 1rem;
}
.section-desc {
  font-size: 1.05rem;
  color: var(--gray-mid);
  max-width: 600px;
  line-height: 1.7;
}

/* ── TOUR OVERVIEW ── */
#overview {
  background: var(--navy);
  padding: 5rem 0 6rem;
}
#overview .inner {
  padding: 0 3rem;
}
.tour-sections {
  margin-top: 4rem;
  display: flex;
  flex-direction: column;
  gap: 5rem;
}
.tour-section-block {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 3rem;
  align-items: start;
}
.tour-section-block.reverse {
  grid-template-columns: 1fr 300px;
}
.tour-section-block.reverse .section-info { order: 2; }
.tour-section-block.reverse .carousel-wrap { order: 1; }

.section-info {
  position: sticky;
  top: 7rem;
}
.sec-num {
  font-family: var(--font-display);
  font-size: 6rem;
  line-height: 1;
  color: rgba(255,255,255,0.05);
  letter-spacing: 0.05em;
  margin-bottom: -1rem;
}
.sec-badge {
  display: inline-block;
  padding: 0.3rem 0.8rem;
  border-radius: 2px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.badge-orange { background: #c04b00; color: #ffe5cc; }
.badge-blue   { background: #0a3d6b; color: #b3d4f5; border: 1px solid #1a5490; }
.badge-green  { background: #0a4d35; color: #b3f0d4; }
.badge-yellow { background: #5a4200; color: #ffe4a0; }

.sec-title {
  font-family: var(--font-display);
  font-size: 2.2rem;
  letter-spacing: 0.06em;
  color: var(--cream);
  margin-bottom: 0.4rem;
}
.sec-duration {
  font-size: 0.8rem;
  color: var(--amber);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.sec-desc {
  font-size: 0.9rem;
  color: var(--gray-mid);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.sec-highlights {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.sec-highlights li {
  list-style: none;
  font-size: 0.82rem;
  color: var(--cream);
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.sec-highlights li::before {
  content: '→';
  color: var(--teal);
  font-weight: 700;
}

/* ── CAROUSEL ── */
.carousel-wrap {
  position: relative;
  overflow: hidden;
}
.carousel {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  scroll-snap-type: none;
  scroll-behavior: auto;
  padding-bottom: 0.5rem;
  scrollbar-width: none;
  scroll-margin: 0;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
.carousel::-webkit-scrollbar { display: none; }
.car-slide {
  flex: 0 0 calc(50% - 0.375rem);
  min-width: 240px;
  scroll-snap-align: start;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  cursor: default;
  aspect-ratio: 4/3;
}
.car-slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  display: block;
  pointer-events: none;
  user-select: none;
}
.car-slide:hover img { transform: scale(1.06); }
.car-slide .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,31,53,0.85) 0%, transparent 55%);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1rem;
}
.car-slide:hover .overlay { opacity: 1; }
.car-slide .overlay .place {
  font-family: var(--font-display);
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--cream);
}
.car-slide .overlay .date {
  font-size: 0.72rem;
  color: var(--amber);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}
/* IMG PLACEHOLDER */
.img-ph {
  width: 100%; height: 100%;
  object-fit: cover;
  background: var(--navy-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: 0.7rem;
  color: var(--gray-mid);
  text-align: center;
  padding: 1rem;
  position: relative;
}
.img-ph-inner {
  background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px);
  position: absolute;
  inset: 0;
}

/* ── HIGHLIGHTS ── */
#highlights {
  background: linear-gradient(180deg, var(--navy) 0%, #0a1929 100%);
}
.highlights-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-top: 3rem;
}
.highlight-card {
  position: relative;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 4/3;
  background: var(--navy-mid);
}
.highlight-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  display: block;
}
.highlight-card:hover img { transform: scale(1.07); }
.highlight-card .hl-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,25,41,0.9) 0%, transparent 55%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1.2rem;
  transition: background 0.3s;
}
.highlight-card:hover .hl-overlay {
  background: linear-gradient(to top, rgba(10,25,41,0.97) 0%, rgba(10,25,41,0.3) 100%);
}
.hl-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 0.06em;
  color: var(--cream);
  margin-bottom: 0.3rem;
}
.hl-desc {
  font-size: 0.8rem;
  color: var(--gray-soft);
  line-height: 1.5;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s;
  opacity: 0;
}
.highlight-card:hover .hl-desc { max-height: 5rem; opacity: 1; }
.hl-tag {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.4rem;
}

/* ── ITINERARY ── */
#itinerary {
  background: #08162a;
  padding: 6rem 0;
}
#itinerary .inner {
  padding: 0 3rem;
}
.itinerary-header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  margin-bottom: 3rem;
}
.section-filter {
  display: flex;
  gap: 0.5rem;
}
.filter-btn {
  padding: 0.5rem 1rem;
  border-radius: 2px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--gray-mid);
  transition: all 0.2s;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.filter-btn.active, .filter-btn:hover { background: var(--navy-light); border-color: var(--navy-light); color: var(--cream); }

.timeline {
  position: relative;
  padding-left: 2.5rem;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    #c04b00 0%,
    #c04b00 25.6%,
    #0a3d6b 25.6%,
    #0a3d6b 48.8%,
    #0a4d35 48.8%,
    #0a4d35 71.8%,
    #5a4200 71.8%,
    #5a4200 100%);
  opacity: 0.75;
}
.timeline-section-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2.5rem 0 1.5rem;
  position: relative;

// ── CAROUSEL COMPONENT ──────────────────────────────────
function Carousel({ slides, id }) {
  const ref = useRef(null);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;

    let scrollPos = 0;
    let isAutoScrolling = true;
    let animationId = null;
    const scrollSpeed = 1.5; // píxeles por frame
    let lastScrollLeft = 0;
    let touchStartX = 0;
    let touchStartY = 0;

    const autoScroll = () => {
      if (isAutoScrolling) {
        scrollPos += scrollSpeed;
        el.scrollLeft = scrollPos;

        // Loop infinito: si llegamos al final, reinicia suavemente
        if (scrollPos >= el.scrollWidth - el.clientWidth - 5) {
          scrollPos = 0;
        }
      }

      lastScrollLeft = el.scrollLeft;
      animationId = requestAnimationFrame(autoScroll);
    };

    // Prevenir scroll manual manteniendo la posición
    const handleScroll = (e) => {
      if (Math.abs(el.scrollLeft - lastScrollLeft) > 2) {
        el.scrollLeft = lastScrollLeft;
      }
    };

    // Registrar punto inicial del toque
    const handleTouchStart = (e) => {
      if (e.touches && e.touches.length > 0) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }
      isAutoScrolling = false;
    };

    // Prevenir solo scroll horizontal (izq/der)
    const handleTouchMove = (e) => {
      if (!e.touches || e.touches.length === 0) return;

      const currentX = e.touches[0].clientX;
      const currentY = e.touches[0].clientY;

      const diffX = Math.abs(currentX - touchStartX);
      const diffY = Math.abs(currentY - touchStartY);

      // Solo prevenir si es movimiento horizontal (izq/der) más que vertical
      if (diffX > diffY + 10) {
        e.preventDefault();
      }
    };

    const handleTouchEnd = () => {
      setTimeout(() => {
        isAutoScrolling = true;
      }, 2000);
    };

    const handleWheel = (e) => {
      // Solo bloquear scroll horizontal, permitir vertical
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        e.preventDefault();
      }
    };

    el.addEventListener('scroll', handleScroll, false);
    el.addEventListener('touchstart', handleTouchStart);
    el.addEventListener('touchend', handleTouchEnd);
    el.addEventListener('touchmove', handleTouchMove, { passive: false });
    el.addEventListener('wheel', handleWheel, { passive: false });

    animationId = requestAnimationFrame(autoScroll);

    return () => {
      cancelAnimationFrame(animationId);
      el.removeEventListener('scroll', handleScroll);
      el.removeEventListener('touchstart', handleTouchStart);
      el.removeEventListener('touchend', handleTouchEnd);
      el.removeEventListener('touchmove', handleTouchMove);
      el.removeEventListener('wheel', handleWheel);
    };
  }, []);

  return (
    <div className="carousel-wrap">
      <div className="carousel" ref={ref}>
        {slides.map((s, i) =>
        <div key={i} className="car-slide">
            <img src={s.img} alt="phase slide" loading="lazy" />
          </div>
        )}
      </div>
    </div>);

}

// ── MAIN APP ─────────────────────────────────────────────
function App() {
  useEffect(() => {
    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');

    const closeMenu = () => {
      navMenu.classList.remove('mobile-open');
      menuToggle.classList.remove('open');
    };

    if (menuToggle && navMenu) {
      menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('mobile-open');
        menuToggle.classList.toggle('open');
      });

      navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeMenu);
      });

      // Close menu on scroll
      let lastScrollTop = 0;
      window.addEventListener('scroll', () => {
        if (navMenu.classList.contains('mobile-open')) {
          closeMenu();
        }
      }, { passive: true });
    }

    // Navbar scroll effect
    const nav = document.getElementById('navbar');
    const handleScroll = () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    };
    window.addEventListener('scroll', handleScroll);

    // Reveal on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    return () => {
      window.removeEventListener('scroll', handleScroll);
      observer.disconnect();
    };
  }, []);

  return (
    <>
      <TourOverview />
      <Itinerary />
      <AboutSection />
      <CTASection />
      <Footer />
      <TweaksApp />
    </>);

}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
